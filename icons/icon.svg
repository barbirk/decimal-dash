<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#7c3aed" rx="100"/>
  
  <!-- Inner circle for depth -->
  <circle cx="256" cy="256" r="180" fill="#8b5cf6"/>
  
  <!-- Multiplication symbol (X) -->
  <g transform="translate(256, 256)">
    <!-- First diagonal line -->
    <rect x="-80" y="-20" width="160" height="40" fill="#fbbf24" rx="20" transform="rotate(45)"/>
    <!-- Second diagonal line -->
    <rect x="-80" y="-20" width="160" height="40" fill="#fbbf24" rx="20" transform="rotate(-45)"/>
  </g>
  
  <!-- Decimal dots -->
  <circle cx="160" cy="320" r="20" fill="#fbbf24"/>
  <circle cx="352" cy="320" r="20" fill="#fbbf24"/>
  
  <!-- Decorative sparkles -->
  <g fill="#fbbf24">
    <circle cx="120" cy="160" r="12"/>
    <circle cx="392" cy="160" r="12"/>
    <circle cx="120" cy="392" r="10"/>
    <circle cx="392" cy="392" r="10"/>
  </g>
</svg>
