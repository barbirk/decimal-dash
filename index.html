<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#7c3aed" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Decimal Dash" />
  <title>Decimal Dash — Multiply with Decimals!</title>
  <meta name="description" content="An interactive bilingual app to learn decimal multiplication through 10 mini-games." />
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="./manifest.json" />
  
  <!-- iOS Icons -->
  <link rel="apple-touch-icon" href="./icons/icon-72.png" />
  <link rel="apple-touch-icon" sizes="72x72" href="./icons/icon-72.png" />
  <link rel="apple-touch-icon" sizes="96x96" href="./icons/icon-96.png" />
  <link rel="apple-touch-icon" sizes="128x128" href="./icons/icon-128.png" />
  <link rel="apple-touch-icon" sizes="144x144" href="./icons/icon-144.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="./icons/icon-152.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="384x384" href="./icons/icon-384.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="./icons/icon-512.png" />
  
  <!-- Preconnect to Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Confetti canvas -->
  <canvas id="confetti-canvas"></canvas>

  <!-- Top navigation bar -->
  <header id="app-header">
    <button id="home-btn" onclick="showHome()" aria-label="Home">🏠</button>
    <h1 id="app-title">Decimal Dash</h1>
    <button id="lang-btn" onclick="toggleLang()" aria-label="Switch language">🇫🇷 FR</button>
  </header>

  <!-- Main container -->
  <main id="main">
    <!-- Home screen rendered by app.js -->
    <div id="home-screen"></div>
    <!-- Game area replaced per game -->
    <div id="game-container" class="hidden"></div>
  </main>

  <!-- Scripts -->
  <script src="lang.js"></script>
  <script src="app.js"></script>
  <script src="games/game1.js"></script>
  <script src="games/game2.js"></script>
  <script src="games/game3.js"></script>
  <script src="games/game4.js"></script>
  <script src="games/game5.js"></script>
  <script src="games/game6.js"></script>
  <script src="games/game7.js"></script>
  <script src="games/game8.js"></script>
  <script src="games/game9.js"></script>
  <script src="games/game10.js"></script>
  <!-- Boot after all scripts parsed -->
  <script>_boot();</script>
  
  <!-- Service Worker Registration for PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js')
          .then(function(registration) {
            console.log('Decimal Dash: Service Worker registered with scope:', registration.scope);
          })
          .catch(function(error) {
            console.log('Decimal Dash: Service Worker registration failed:', error);
          });
      });
    }
  </script>
</body>
</html>
